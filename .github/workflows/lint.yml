name: Lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on *.sh
        run: |
          # Scope to *.sh only — ShellCheck has no zsh support, so the
          # distros/shared/zsh/*.zsh files are intentionally left out.
          # Every *.sh declares its dialect via a #!/bin/bash shebang, so no
          # --shell flag is needed. SC1090/SC1091 are silenced: scripts source
          # files by runtime path that don't exist on the runner.
          git ls-files -z '*.sh' \
            | xargs -0 -r shellcheck --external-sources -e SC1090,SC1091

  psscriptanalyzer:
    name: PSScriptAnalyzer (PowerShell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer on windows/
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force
          $results = Invoke-ScriptAnalyzer -Path windows -Recurse -Severity Warning, Error
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no warnings or errors."
