name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so SonarCloud can attribute issues to the right commits.
          fetch-depth: 0
      # Provide the JRE ourselves so the scanner doesn't query SonarCloud's API to
      # download one at runtime (a transient point of failure). Paired with
      # sonar.scanner.skipJreProvisioning below.
      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        with:
          args: -Dsonar.scanner.skipJreProvisioning=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
