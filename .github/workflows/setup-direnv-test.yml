name: setup-direnv test

# Exercises the setup-direnv composite action end to end: that it installs a
# runtime declared in an .envrc and exposes it to *subsequent* steps (proving the
# $GITHUB_PATH / $GITHUB_ENV export, not just a transient direnv shell), and that
# it fails when there is no .envrc to act on.

on:
  pull_request:
    paths:
      - 'actions/setup-direnv/**'
      - '.github/workflows/setup-direnv-test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  activate-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run setup-direnv against the sdk fixture
        uses: ./actions/setup-direnv
        with:
          working-directory: actions/setup-direnv/test/fixture-sdk

      - name: Assert the runtime propagated to later steps
        run: |
          set -euo pipefail
          # Each SDKMAN candidate exposes its bin on PATH and its <CANDIDATE>_HOME on
          # $GITHUB_ENV (SDKMAN's convention), pinned to the version the .envrc declares.
          echo "JAVA_HOME=${JAVA_HOME:-<unset>}  MAVEN_HOME=${MAVEN_HOME:-<unset>}"
          test "${JAVA_HOME:-}"  = "$HOME/.sdkman/candidates/java/21.0.2-tem"
          test "${MAVEN_HOME:-}" = "$HOME/.sdkman/candidates/maven/3.9.9"
          java -version
          command -v java | grep -q "$HOME/.sdkman/candidates/java/"
          mvn -version
          command -v mvn | grep -q "$HOME/.sdkman/candidates/maven/"

  activate-fnm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run setup-direnv against the fnm fixture
        uses: ./actions/setup-direnv
        with:
          working-directory: actions/setup-direnv/test/fixture-fnm

      - name: Assert the runtime propagated to later steps
        run: |
          set -euo pipefail
          # fnm exposes the node bin on PATH, pinned to the version the .envrc declares.
          # Resolving node here (a later step) proves the $GITHUB_PATH export, not just a
          # transient direnv shell.
          node --version
          test "$(node --version)" = "v22.14.0"
          command -v node | grep -q "$HOME/.fnm/node-versions/v22.14.0/"

  activate-pixi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run setup-direnv against the pixi fixture
        uses: ./actions/setup-direnv
        with:
          working-directory: actions/setup-direnv/test/fixture-pixi

      - name: Assert the runtime propagated to later steps
        run: |
          set -euo pipefail
          # pixi exposes the workspace's default-env bin on PATH. Resolving python
          # here (a later step) to that env proves the $GITHUB_PATH export, not just
          # a transient direnv shell. pixi itself is also exposed from ~/.pixi/bin.
          pixi --version
          command -v pixi | grep -q "$HOME/.pixi/bin/"
          python --version
          command -v python | grep -q "/actions/setup-direnv/test/fixture-pixi/.pixi/envs/default/bin/"

  activate-sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run setup-direnv against the sonarqube fixture
        uses: ./actions/setup-direnv
        with:
          working-directory: actions/setup-direnv/test/fixture-sonarqube

      - name: Assert the no-op directive did not fail or export anything
        run: |
          set -euo pipefail
          # use sonarqube_mcp is a deliberate CI no-op: the action must succeed on the
          # committed .envrc (proving the directive is defined so evaluation doesn't error),
          # and it must export nothing to later steps.
          echo "SONARQUBE_TOKEN=${SONARQUBE_TOKEN:-<unset>}  SONARQUBE_ORG=${SONARQUBE_ORG:-<unset>}"
          test -z "${SONARQUBE_TOKEN:-}"
          test -z "${SONARQUBE_ORG:-}"

  missing-envrc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Point at a directory that has no .envrc (.github is never a direnv root).
      - name: Run setup-direnv where there is no .envrc
        id: run
        continue-on-error: true
        uses: ./actions/setup-direnv
        with:
          working-directory: .github

      - name: Assert the action failed
        run: |
          set -euo pipefail
          if [[ "${{ steps.run.outcome }}" != "failure" ]]; then
            echo "expected setup-direnv to fail on a missing .envrc, got: ${{ steps.run.outcome }}" >&2
            exit 1
          fi
