name: setup-direnv test

# Exercises the setup-direnv composite action end to end: that it installs a
# runtime declared in an .envrc and exposes it to *subsequent* steps (proving the
# $GITHUB_PATH / $GITHUB_ENV export, not just a transient direnv shell), and that
# it fails when there is no .envrc to act on.

on:
  pull_request:
    paths:
      - 'setup-direnv/**'
      - '.github/workflows/setup-direnv-test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run setup-direnv against the fixture
        uses: ./setup-direnv
        with:
          working-directory: setup-direnv/test/fixture

      - name: Assert the runtime propagated to later steps
        run: |
          set -euo pipefail
          echo "JAVA_HOME=${JAVA_HOME:-<unset>}"
          test -n "${JAVA_HOME:-}"
          case "$JAVA_HOME" in
            "$HOME/.sdkman/candidates/java/"*) : ;;
            *) echo "JAVA_HOME is not a SDKMAN candidate dir: $JAVA_HOME" >&2; exit 1 ;;
          esac
          java -version
          command -v java | grep -q "$HOME/.sdkman/candidates/java/"

  missing-envrc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Point at a directory that has no .envrc (.github is never a direnv root).
      - name: Run setup-direnv where there is no .envrc
        id: run
        continue-on-error: true
        uses: ./setup-direnv
        with:
          working-directory: .github

      - name: Assert the action failed
        run: |
          set -euo pipefail
          if [[ "${{ steps.run.outcome }}" != "failure" ]]; then
            echo "expected setup-direnv to fail on a missing .envrc, got: ${{ steps.run.outcome }}" >&2
            exit 1
          fi
