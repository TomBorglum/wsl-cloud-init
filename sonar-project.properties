sonar.organization=tomborglum
sonar.projectKey=TomBorglum_wsl-cloud-init

# Analyze the whole repo. Sonar auto-detects supported languages (shell, IaC,
# secrets, etc.); no per-language config is needed here.
sonar.sources=.

# The docs/ landing page layout is a Jekyll/Liquid template, not analyzable HTML:
# its <title> and metadata are injected by jekyll-seo-tag ({% seo %}) at build
# time, which Sonar's static HTML parser can't see, so it misfires (e.g. "Add a
# <title> tag"). Exclude the template from analysis.
sonar.exclusions=docs/_layouts/**
